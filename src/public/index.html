<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scope — Wallet Health &amp; Story</title>
<meta name="description" content="Deterministic wallet health check and plain-English activity story. An agent service on OKX.AI." />
<style>
  :root {
    /* Considered dark palette — near-black with a faint cool cast, one mint signal.
       Not neon: the accent is muted, semantic colors carry meaning + a glyph. */
    --bg:        oklch(0.165 0.008 245);
    --surface:   oklch(0.205 0.010 245);
    --surface-2: oklch(0.245 0.012 245);
    --border:    oklch(0.320 0.012 245);
    --border-2:  oklch(0.420 0.014 245);
    --ink:       oklch(0.940 0.004 245);
    --muted:     oklch(0.720 0.010 245);
    --faint:     oklch(0.560 0.010 245);
    --accent:    oklch(0.840 0.130 175);  /* mint — brand/prompt/cursor */
    --ok:        oklch(0.820 0.150 150);
    --warn:      oklch(0.830 0.140 78);
    --danger:    oklch(0.720 0.170 25);
    --accent-dim: oklch(0.840 0.130 175 / 0.12);
    --warn-dim:   oklch(0.830 0.140 78 / 0.10);
    --danger-dim: oklch(0.720 0.170 25 / 0.12);

    --mono: ui-monospace, "SF Mono", SFMono-Regular, "Cascadia Code", "JetBrains Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --step: clamp(1.5rem, 4vw, 2.75rem);
    --z-toast: 40;
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.55;
    /* subtle scanline-free vignette; not glassmorphism, just depth */
    background-image: radial-gradient(120% 80% at 50% -10%, oklch(0.245 0.02 245) 0%, var(--bg) 55%);
    background-attachment: fixed;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  ::selection { background: var(--accent-dim); }

  a { color: var(--accent); text-underline-offset: 2px; }

  .wrap { max-width: 900px; margin: 0 auto; padding: clamp(1.25rem, 4vw, 3rem) clamp(1rem, 4vw, 2rem) 5rem; }

  /* ── header ─────────────────────────────────────────── */
  header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 0.75rem 1rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
  .brand { font-size: 1.55rem; font-weight: 680; letter-spacing: -0.01em; color: var(--ink); }
  .brand b { color: var(--accent); font-weight: 680; }
  .tagline { color: var(--muted); font-size: 0.82rem; }
  .endpoint { margin-left: auto; font-size: 0.72rem; color: var(--faint); word-break: break-all; text-align: right; }
  .endpoint .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--ok); margin-right: 0.4rem; box-shadow: 0 0 6px var(--ok); vertical-align: middle; }

  /* ── prompt / input ─────────────────────────────────── */
  form { margin: 1.75rem 0 0; }
  .promptline { display: flex; align-items: center; gap: 0.6rem; color: var(--muted); font-size: 0.8rem; margin-bottom: 0.55rem; }
  .promptline .sig { color: var(--accent); }
  .field {
    display: flex; align-items: stretch; gap: 0.5rem;
    background: var(--surface); border: 1px solid var(--border-2); border-radius: 8px; padding: 0.35rem;
    transition: border-color 140ms ease, box-shadow 140ms ease;
  }
  .field:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .caret { align-self: center; padding-left: 0.55rem; color: var(--accent); user-select: none; }
  input[type=text] {
    flex: 1 1 auto; min-width: 0; background: transparent; border: 0; outline: none;
    color: var(--ink); font-family: var(--mono); font-size: 0.95rem; padding: 0.55rem 0.25rem;
  }
  input::placeholder { color: var(--faint); }
  .chainpill { align-self: center; color: var(--muted); font-size: 0.78rem; padding: 0 0.5rem; border-left: 1px solid var(--border); white-space: nowrap; }
  button.run {
    flex: 0 0 auto; font-family: var(--mono); font-size: 0.9rem; font-weight: 620; cursor: pointer;
    color: var(--bg); background: var(--accent); border: 0; border-radius: 6px; padding: 0.6rem 1.15rem;
    transition: filter 140ms ease, transform 80ms ease;
  }
  button.run:hover:not(:disabled) { filter: brightness(1.08); }
  button.run:active:not(:disabled) { transform: translateY(1px); }
  button.run:disabled { cursor: not-allowed; filter: saturate(0.4) brightness(0.8); }
  button.run:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  .hint { margin-top: 0.55rem; font-size: 0.75rem; color: var(--faint); display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .hint button { background: none; border: 0; color: var(--muted); font-family: var(--mono); font-size: 0.75rem; cursor: pointer; padding: 0; text-decoration: underline dotted; text-underline-offset: 3px; }
  .hint button:hover { color: var(--accent); }

  /* ── output ─────────────────────────────────────────── */
  main { margin-top: 2rem; }

  .block { border: 1px solid var(--border); border-radius: 10px; background: var(--surface); margin-bottom: 1rem; overflow: hidden; }
  .block > .head { display: flex; align-items: baseline; gap: 0.6rem; padding: 0.7rem 1rem; border-bottom: 1px solid var(--border); background: var(--surface-2); }
  .block > .head .label { color: var(--muted); font-size: 0.72rem; letter-spacing: 0.06em; }
  .block > .head .label .sig { color: var(--accent); }
  .block > .head .tag { margin-left: auto; font-size: 0.72rem; padding: 0.1rem 0.5rem; border-radius: 999px; border: 1px solid var(--border-2); color: var(--muted); }
  .tag.ok { color: var(--ok); border-color: color-mix(in oklch, var(--ok), transparent 60%); }
  .tag.warn { color: var(--warn); border-color: color-mix(in oklch, var(--warn), transparent 55%); }
  .tag.danger { color: var(--danger); border-color: color-mix(in oklch, var(--danger), transparent 55%); }
  .block > .body { padding: 0.9rem 1rem; }

  .kv { display: grid; grid-template-columns: max-content 1fr; gap: 0.3rem 1.25rem; align-items: center; }
  .kv dt { color: var(--faint); font-size: 0.82rem; }
  .kv dd { margin: 0; color: var(--ink); }

  .bar { position: relative; height: 8px; border-radius: 4px; background: var(--surface-2); overflow: hidden; margin-top: 0.5rem; border: 1px solid var(--border); }
  .bar > i { position: absolute; inset: 0 auto 0 0; background: var(--accent); border-radius: 4px; transition: width 700ms cubic-bezier(0.22, 1, 0.36, 1); }
  .bar.warn > i { background: var(--warn); }

  ul.rows { list-style: none; margin: 0; padding: 0; }
  ul.rows li { display: flex; align-items: baseline; gap: 0.75rem; padding: 0.32rem 0; border-top: 1px dashed var(--border); }
  ul.rows li:first-child { border-top: 0; }
  ul.rows .tok { color: var(--ink); }
  ul.rows .meta { margin-left: auto; color: var(--muted); font-size: 0.82rem; white-space: nowrap; }
  ul.rows .reason { color: var(--faint); font-size: 0.76rem; }

  .disclaimer { margin-top: 0.8rem; padding: 0.6rem 0.75rem; border: 1px solid color-mix(in oklch, var(--warn), transparent 55%); background: var(--warn-dim); border-radius: 6px; color: color-mix(in oklch, var(--warn), var(--ink) 30%); font-size: 0.78rem; display: flex; gap: 0.5rem; }
  .disclaimer .g { color: var(--warn); }

  .prose { color: var(--ink); max-width: 72ch; line-height: 1.65; white-space: pre-wrap; }
  .prose.story { color: color-mix(in oklch, var(--ink), var(--muted) 15%); }

  .warnings { border: 1px solid color-mix(in oklch, var(--warn), transparent 50%); background: var(--warn-dim); }
  .warnings .head { background: transparent; border-bottom: 0; }
  .warnings .body { padding-top: 0; }
  .warnings li { color: color-mix(in oklch, var(--warn), var(--ink) 25%); }

  .foot { margin-top: 0.5rem; color: var(--faint); font-size: 0.74rem; display: flex; gap: 1rem; flex-wrap: wrap; }

  /* ── idle / empty ───────────────────────────────────── */
  .idle { color: var(--muted); border: 1px dashed var(--border-2); border-radius: 10px; padding: 1.5rem 1.25rem; }
  .idle h2 { margin: 0 0 0.6rem; font-size: 0.95rem; color: var(--ink); font-weight: 640; }
  .idle ul { margin: 0.4rem 0 0; padding-left: 1.1rem; color: var(--muted); }
  .idle li { margin: 0.15rem 0; }
  .idle .sig { color: var(--accent); }

  /* ── loading readout ────────────────────────────────── */
  .loading { border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 1rem 1.15rem; }
  .loading .line { display: flex; align-items: baseline; gap: 0.6rem; padding: 0.18rem 0; color: var(--muted); }
  .loading .line .mk { width: 1.1rem; color: var(--ok); }
  .loading .line.active { color: var(--ink); }
  .loading .line.active .mk { color: var(--accent); }
  .loading .elapsed { margin-top: 0.7rem; color: var(--faint); font-size: 0.78rem; }
  .cur { display: inline-block; width: 0.55em; height: 1.05em; background: var(--accent); translate: 0 0.18em; animation: blink 1.05s steps(2, start) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .error { border: 1px solid color-mix(in oklch, var(--danger), transparent 45%); background: var(--danger-dim); border-radius: 10px; padding: 1rem 1.15rem; }
  .error .code { color: var(--danger); font-weight: 640; }
  .error .msg { color: color-mix(in oklch, var(--danger), var(--ink) 40%); margin-top: 0.3rem; }

  /* staggered reveal — enhances already-visible content */
  .reveal { animation: rise 420ms cubic-bezier(0.22, 1, 0.36, 1) both; }
  @keyframes rise { from { opacity: 0; translate: 0 8px; } to { opacity: 1; translate: 0 0; } }

  @media (max-width: 560px) {
    .endpoint { margin-left: 0; text-align: left; width: 100%; }
    .kv { grid-template-columns: 1fr; gap: 0.1rem 0; }
    .kv dd { margin-bottom: 0.4rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
    .cur { opacity: 1; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="brand"><b>&gt;</b> scope</div>
      <div class="tagline">wallet health &amp; story · agent service</div>
    </div>
    <div class="endpoint"><span class="dot"></span><span id="ep">POST /api/analyze</span></div>
  </header>

  <form id="form" autocomplete="off">
    <div class="promptline"><span class="sig">scope</span> ~ <span class="sig">%</span> analyze &lt;wallet_address&gt;</div>
    <div class="field">
      <span class="caret">&gt;</span>
      <input id="addr" type="text" spellcheck="false" inputmode="text"
             placeholder="0x… paste an Ethereum wallet address"
             aria-label="Wallet address" />
      <span class="chainpill">chain: ethereum</span>
      <button class="run" id="run" type="submit">run</button>
    </div>
    <div class="hint">
      <span>read-only · returns a health check + plain-English story</span>
      <button type="button" id="sample">load example wallet</button>
    </div>
  </form>

  <main id="out" aria-live="polite">
    <!-- idle state injected on load -->
  </main>
</div>

<script>
"use strict";
const ENDPOINT = "/api/analyze";
const SAMPLE = "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045";
const out = document.getElementById("out");
const form = document.getElementById("form");
const addr = document.getElementById("addr");
const runBtn = document.getElementById("run");
document.getElementById("ep").textContent = "POST " + location.origin + ENDPOINT;

/* ── safe DOM builder: all data goes through textContent, never innerHTML.
   Token symbols are attacker-controlled (spam tokens carry crafted names). ── */
function el(tag, props = {}, kids = []) {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (v == null) continue;
    if (k === "class") n.className = v;
    else if (k === "text") n.textContent = v;
    else if (k === "html") throw new Error("no innerHTML");
    else n.setAttribute(k, v);
  }
  for (const kid of [].concat(kids)) if (kid != null) n.append(kid);
  return n;
}
function fmtDate(iso) {
  const d = new Date(iso);
  return isNaN(d) ? String(iso) : d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
}
function money(n) { return "$" + Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function short(a) { return typeof a === "string" && a.length > 14 ? a.slice(0, 8) + "…" + a.slice(-4) : a; }

function block(labelSig, labelText, tag) {
  const head = el("div", { class: "head" }, [
    el("span", { class: "label" }, [el("span", { class: "sig", text: labelSig }), document.createTextNode(" " + labelText)]),
  ]);
  if (tag) head.append(el("span", { class: "tag " + tag.kind, text: tag.text }));
  const body = el("div", { class: "body" });
  return { root: el("div", { class: "block reveal" }, [head, body]), body };
}

function render(data) {
  out.replaceChildren();
  const frag = document.createDocumentFragment();
  let delay = 0;
  const stagger = (node) => { node.style.animationDelay = delay + "ms"; delay += 55; frag.append(node); };

  const hc = data.health_check || {};

  /* concentration */
  {
    const c = hc.concentration_risk || {};
    const flagged = !!c.flagged;
    const b = block(">", "concentration", flagged ? { kind: "warn", text: "⚠ concentrated" } : { kind: "ok", text: "ok" });
    const pct = Number(c.percentage) || 0;
    const kv = el("dl", { class: "kv" }, [
      el("dt", { text: "top token" }), el("dd", { text: c.top_token || "—" }),
      el("dt", { text: "share" }), el("dd", { text: pct.toFixed(1) + "%" }),
    ]);
    const bar = el("div", { class: "bar" + (flagged ? " warn" : "") }, [el("i")]);
    b.body.append(kv, bar);
    requestAnimationFrame(() => { bar.firstChild.style.width = Math.min(100, pct) + "%"; });
    stagger(b.root);
  }

  /* stale approvals */
  {
    const list = hc.stale_approvals || [];
    const b = block(">", "stale approvals", { kind: list.length ? "warn" : "ok", text: String(list.length) });
    if (!list.length) b.body.append(el("div", { class: "reason", text: "none flagged — no unlimited, long-stale, or vulnerable approvals." }));
    else {
      const ul = el("ul", { class: "rows" });
      for (const a of list.slice(0, 12)) {
        ul.append(el("li", {}, [
          el("span", { class: "tok", text: a.token || short(a.contract) }),
          el("span", { class: "meta", text: "granted " + fmtDate(a.granted_at) }),
        ]));
      }
      b.body.append(ul);
      if (list.length > 12) b.body.append(el("div", { class: "reason", text: "+ " + (list.length - 12) + " more" }));
    }
    stagger(b.root);
  }

  /* dead / illiquid */
  {
    const list = hc.dead_tokens || [];
    const b = block(">", "dead / illiquid tokens", { kind: list.length ? "warn" : "ok", text: String(list.length) });
    if (!list.length) b.body.append(el("div", { class: "reason", text: "none — held tokens have real, active markets." }));
    else {
      const ul = el("ul", { class: "rows" });
      for (const d of list.slice(0, 12)) ul.append(el("li", {}, [el("span", { class: "tok", text: d.token })]));
      b.body.append(ul);
      if (list.length > 12) b.body.append(el("div", { class: "reason", text: "+ " + (list.length - 12) + " more" }));
    }
    stagger(b.root);
  }

  /* dust */
  {
    const list = hc.dust || [];
    const b = block(">", "value-only dust", { kind: list.length ? "warn" : "ok", text: String(list.length) });
    if (!list.length) b.body.append(el("div", { class: "reason", text: "no sub-$2 holdings detected." }));
    else {
      const ul = el("ul", { class: "rows" });
      for (const d of list) ul.append(el("li", {}, [
        el("span", { class: "tok", text: d.token }),
        el("span", { class: "meta", text: money(d.usd_value) }),
      ]));
      b.body.append(ul);
      const disc = list[0] && list[0].disclaimer;
      if (disc) b.body.append(el("div", { class: "disclaimer" }, [el("span", { class: "g", text: "⚠" }), el("span", { text: disc })]));
    }
    stagger(b.root);
  }

  /* health summary (narration) */
  if (data.health_summary) {
    const b = block(">", "health summary", null);
    b.body.append(el("div", { class: "prose", text: data.health_summary }));
    stagger(b.root);
  }

  /* activity story (narration) */
  if (data.activity_story) {
    const b = block(">", "activity story", null);
    b.body.append(el("div", { class: "prose story", text: data.activity_story }));
    stagger(b.root);
  }

  /* warnings (degraded) */
  if (Array.isArray(data.warnings) && data.warnings.length) {
    const head = el("div", { class: "head" }, [el("span", { class: "label" }, [el("span", { class: "sig", text: "!" }), document.createTextNode(" degraded — partial result")])]);
    const body = el("div", { class: "body" }, [el("ul", { class: "rows" }, data.warnings.map((w) => el("li", { text: w })))]);
    stagger(el("div", { class: "block warnings reveal" }, [head, body]));
  }

  /* footer meta */
  const foot = el("div", { class: "foot reveal" }, [
    el("span", { text: "wallet " + short(data.wallet_address) }),
    el("span", { text: "chain " + data.chain }),
    data.generated_at ? el("span", { text: "generated " + new Date(data.generated_at).toLocaleString() }) : null,
  ]);
  foot.style.animationDelay = delay + "ms";
  frag.append(foot);

  out.append(frag);
}

/* ── loading readout ── */
const STEPS = ["fetching token balances", "scanning token approvals", "pricing markets · deep scan", "detecting dust & dead tokens", "generating narration"];
let loadTimer = null, elapsedTimer = null;
function showLoading() {
  out.replaceChildren();
  const box = el("div", { class: "loading" });
  const lines = STEPS.map((s) => {
    const line = el("div", { class: "line" }, [el("span", { class: "mk", text: "·" }), el("span", { class: "txt", text: s })]);
    box.append(line); return line;
  });
  const elapsed = el("div", { class: "elapsed" }, [document.createTextNode("elapsed "), el("span", { id: "elx", text: "0.0s" }), el("span", { class: "cur" })]);
  box.append(elapsed);
  out.append(box);

  let i = 0;
  const advance = () => {
    lines.forEach((l, k) => { l.classList.toggle("active", k === i); if (k < i) l.querySelector(".mk").textContent = "✓"; });
    if (i < lines.length) lines[i].classList.add("active");
  };
  advance();
  loadTimer = setInterval(() => { if (i < lines.length - 1) { i++; advance(); } }, 6000);

  const t0 = performance.now();
  elapsedTimer = setInterval(() => { document.getElementById("elx").textContent = ((performance.now() - t0) / 1000).toFixed(1) + "s"; }, 100);
}
function stopLoading() { clearInterval(loadTimer); clearInterval(elapsedTimer); }

function showError(code, msg) {
  out.replaceChildren(el("div", { class: "error reveal" }, [
    el("div", { class: "code", text: code ? "error " + code : "request failed" }),
    el("div", { class: "msg", text: msg }),
  ]));
}

function showIdle() {
  out.replaceChildren(el("div", { class: "idle" }, [
    el("h2", {}, [el("span", { class: "sig", text: ">" }), document.createTextNode(" paste a wallet address and hit run")]),
    el("div", { text: "Scope returns a deterministic health check plus a plain-English story:" }),
    el("ul", {}, [
      el("li", { text: "concentration risk — is one token too much of the wallet?" }),
      el("li", { text: "stale approvals — old, unlimited, or vulnerable token permissions" }),
      el("li", { text: "dead / illiquid tokens — held tokens with no real market" }),
      el("li", { text: "value-only dust — sub-$2 holdings (with disclaimer)" }),
    ]),
    el("div", { style: "margin-top:0.8rem;color:var(--faint)", text: "the analysis is live and takes ~30–60s — real on-chain reads, not a mock." }),
  ]));
}

async function analyze(address) {
  stopLoading();
  showLoading();
  runBtn.disabled = true; runBtn.textContent = "running";
  try {
    const res = await fetch(ENDPOINT, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ wallet_address: address, chain: "ethereum" }),
    });
    let data = null;
    try { data = await res.json(); } catch { /* non-JSON */ }
    stopLoading();
    if (!res.ok) {
      const msg = (data && data.error) || "the service returned " + res.status + ".";
      showError(res.status, res.status === 502 ? "couldn't read this wallet upstream — try again in a moment. (" + msg + ")" : msg);
    } else {
      render(data);
    }
  } catch (e) {
    stopLoading();
    showError(0, "network error — could not reach the service. check your connection and retry.");
  } finally {
    runBtn.disabled = false; runBtn.textContent = "run";
  }
}

form.addEventListener("submit", (e) => {
  e.preventDefault();
  const v = addr.value.trim();
  if (!v) { addr.focus(); return; }
  analyze(v);
});
document.getElementById("sample").addEventListener("click", () => { addr.value = SAMPLE; addr.focus(); });

showIdle();
</script>
</body>
</html>
